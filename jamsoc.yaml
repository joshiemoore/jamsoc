name: jamsoc

width_addr: &width_addr 32
width_data: &width_data 32
num_harts: &num_harts 1

top_ports:
  inputs:
    clk: 1
    resetn: 1
    uart_rx: 1
    btn0: 1
  outputs:
    uart_tx: 1

    ddr3_addr: 14
    ddr3_ba: 3
    ddr3_dm: 2
    ddr3_cas_n: 1
    ddr3_ck_p: 1
    ddr3_ck_n: 1
    ddr3_cke: 1
    ddr3_cs_n: 1
    ddr3_odt: 1
    ddr3_ras_n: 1
    ddr3_reset_n: 1
    ddr3_we_n: 1

    dbg_fetch_cyc: 1
    dbg_lsu_cyc: 1
    dbg_int: 1
    dbg_ddr3_calib_complete: 1
  inouts:
    gpio: 8
    i2c_scl: 1
    i2c_sda: 1

    ddr3_dq: 16
    ddr3_dqs_p: 2
    ddr3_dqs_n: 2

assignments:
  dbg_fetch_cyc: fetch_cyc
  dbg_lsu_cyc: lsu_cyc
  dbg_int: plic_int_o
  dbg_ddr3_calib_complete: ddr3_calib_complete
  plic_int_i[1]: btn0

modules:
#  cpu0:
#    module: picorv32_wb
#    master: true
#    params:
#      COMPRESSED_ISA: 1
#      ENABLE_MUL: 1
#      ENABLE_DIV: 1
#      STACKADDR: 32'h0000_1ff0
  vex_lsu:
    module: wb_vex_lsu
    master: true
    params:
      WIDTH_ADDR: *width_addr
      WIDTH_DATA: *width_data
    ports:
      lsu_cyc:
        wire: lsu_cyc
      lsu_stb:
        wire: lsu_stb
      lsu_ack:
        wire: lsu_ack
      lsu_we:
        wire: lsu_we
      lsu_adr:
        wire: lsu_adr
      lsu_miso:
        wire: lsu_miso
      lsu_mosi:
        wire: lsu_mosi
      lsu_sel:
        wire: lsu_sel
  vex_fetch:
    module: wb_vex_fetch
    master: true
    params:
      WIDTH_ADDR: *width_addr
      WIDTH_DATA: *width_data
    ports:
      fetch_cyc:
        wire: fetch_cyc
      fetch_stb:
        wire: fetch_stb
      fetch_ack:
        wire: fetch_ack
      fetch_we:
        wire: fetch_we
      fetch_adr:
        wire: fetch_adr
      fetch_miso:
        wire: fetch_miso
      fetch_mosi:
        wire: fetch_mosi
      fetch_sel:
        wire: fetch_sel
  bram0:
    module: wb_a7_bram
    address: 0x00000000
    words: 0x20000
  gpio0:
    module: wb_gpio
    address: 0x10000000
    words: 2
    ports:
      gpio:
        wire: gpio
        width: 32
  uart0:
    module: wb_16550
    address: 0x10001000
    words: 2
    ports:
      uart_int_o:
        wire: plic_int_i[0]
      uart_rx_i:
        wire: uart_rx
      uart_tx_o:
        wire: uart_tx
  i2c0:
    module: wb_i2c_master
    address: 0x10002000
    words: 2
    ports:
      scl:
        wire: i2c_scl
      sda:
        wire: i2c_sda
  aclint_mtimer:
    module: wb_aclint_mtimer
    address: 0x20000000
    words: 0x2000
    ports:
      int_m_timer:
        wire: int_m_timer
        width: *num_harts
  aclint_mswi:
    module: wb_aclint_mswi
    address: 0x21000000
    words: 0x1000
    ports:
      int_m_software:
        wire: int_m_software
        width: *num_harts
  plic:
    module: wb_plic_top
    address: 0x30000000
    words: 0x100000
    params:
      NUM_TARGETS: 2
    ports:
      int_i:
        wire: plic_int_i
        width: 31
      int_o:
        wire: plic_int_o

  clk_ibuf:
    module: IBUF
    bus: false
    ports:
      I:
        wire: clk
      O:
        wire: clk_ibuf_o
  clk_bufg:
    module: BUFG
    bus: false
    ports:
      I:
        wire: clk_ibuf_o
      O:
        wire: clk_bufg_o
  #resetn_ibuf:
  #  module: IBUF
  #  bus: false
  #  ports:
  #    I:
  #      wire: resetn
  #    O:
  #      wire: resetn_ibuf_o
  #resetn_bufg:
  #  module: BUFG
  #  bus: false
  #  ports:
  #    I:
  #      wire: resetn_ibuf_o
  #    O:
  #      wire: resetn_bufg_o
  ddr3_clks:
    module: ddr3_clks
    bus: false
    ports:
      clk_in1:
        wire: clk_bufg_o
      ddr3_clk:
        wire: ddr3_clk
      ddr3_clk90:
        wire: ddr3_clk90
      ddr3_refclk:
        wire: ddr3_refclk
  ddr3:
    module: wb_ddr3
    address: 0x80000000
    words: 0x4000000
    ports:
      ddr3_addr:
        wire: ddr3_addr
        width: 14
      ddr3_ba:
        wire: ddr3_ba
        width: 3
      ddr3_dm:
        wire: ddr3_dm
        width: 2
      ddr3_dq:
        wire: ddr3_dq
        width: 16
      ddr3_dqs_p:
        wire: ddr3_dqs_p
        width: 2
      ddr3_dqs_n:
        wire: ddr3_dqs_n
        width: 2
      ddr3_cas_n:
        wire: ddr3_cas_n
      ddr3_ck_p:
        wire: ddr3_ck_p
      ddr3_ck_n:
        wire: ddr3_ck_n
      ddr3_cke:
        wire: ddr3_cke
      ddr3_cs_n:
        wire: ddr3_cs_n
      ddr3_odt:
        wire: ddr3_odt
      ddr3_ras_n:
        wire: ddr3_ras_n
      ddr3_reset_n:
        wire: ddr3_reset_n
      ddr3_we_n:
        wire: ddr3_we_n
      sys_reset_n:
        wire: resetn
      ddr3_clk:
        wire: ddr3_clk
      ddr3_clk90:
        wire: ddr3_clk90
      ddr3_ref_clk:
        wire: ddr3_refclk
      ddr3_calib_complete:
        wire: ddr3_calib_complete

  cpu0:
    module: VexiiRiscv
    bus: false
    ports:
      clk:
        wire: wb_clk
      reset:
        wire: wb_rst
      PrivilegedPlugin_logic_rdtime:
        wire: time_us
      PrivilegedPlugin_logic_harts_0_int_m_timer:
        wire: int_m_timer
      PrivilegedPlugin_logic_harts_0_int_m_software:
        wire: int_m_software
      PrivilegedPlugin_logic_harts_0_int_m_external:
        wire: plic_int_o
      LsuCachelessWishbonePlugin_logic_bridge_down_CYC:
        wire: lsu_cyc
      LsuCachelessWishbonePlugin_logic_bridge_down_STB:
        wire: lsu_stb
      LsuCachelessWishbonePlugin_logic_bridge_down_ACK:
        wire: lsu_ack
      LsuCachelessWishbonePlugin_logic_bridge_down_WE:
        wire: lsu_we
      LsuCachelessWishbonePlugin_logic_bridge_down_ADR:
        wire: lsu_adr
        width: *width_addr
      LsuCachelessWishbonePlugin_logic_bridge_down_DAT_MISO:
        wire: lsu_miso
        width: *width_data
      LsuCachelessWishbonePlugin_logic_bridge_down_DAT_MOSI:
        wire: lsu_mosi
        width: *width_data
      LsuCachelessWishbonePlugin_logic_bridge_down_SEL:
        wire: lsu_sel
        width: 4
      FetchCachelessWishbonePlugin_logic_bridge_bus_CYC:
        wire: fetch_cyc
      FetchCachelessWishbonePlugin_logic_bridge_bus_STB:
        wire: fetch_stb
      FetchCachelessWishbonePlugin_logic_bridge_bus_ACK:
        wire: fetch_ack
      FetchCachelessWishbonePlugin_logic_bridge_bus_WE:
        wire: fetch_we
      FetchCachelessWishbonePlugin_logic_bridge_bus_ADR:
        wire: fetch_adr
        width: *width_addr
      FetchCachelessWishbonePlugin_logic_bridge_bus_DAT_MISO:
        wire: fetch_miso
        width: *width_data
      FetchCachelessWishbonePlugin_logic_bridge_bus_DAT_MOSI:
        wire: fetch_mosi
        width: *width_data
      FetchCachelessWishbonePlugin_logic_bridge_bus_SEL:
        wire: fetch_sel
        width: 4

  wb_syscon:
    module: wb_syscon
    bus: false
    ports:
      clk:
        wire: clk_bufg_o
      resetn:
        wire: resetn
      ddr3_calib_complete:
        wire: ddr3_calib_complete
      wb_clk_o:
        wire: wb_clk
      wb_rst_o:
        wire: wb_rst
  timer_us:
    module: timer
    bus: false
    params:
      WIDTH_DATA: 64
      CLKDIV: 100
    ports:
      clk:
        wire: wb_clk
      rst:
        wire: wb_rst
      time_o:
        wire: time_us
        width: 64
